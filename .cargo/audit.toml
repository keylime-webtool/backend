# cargo-audit configuration
# https://docs.rs/cargo-audit/latest/cargo_audit/

[advisories]

# RUSTSEC-2023-0071: rsa crate Marvin Attack (timing sidechannel in PKCS#1 v1.5 decryption)
#
# Accepted because:
# 1. The vulnerable codepath is PKCS#1 v1.5 *decryption*. This project does not
#    perform RSA decryption — rsa is a transitive dependency only.
# 2. Via openidconnect: used for JWT signature *verification*, which is not
#    affected by the Marvin Attack timing sidechannel.
# 3. Via sqlx-mysql (resolved but not activated): sqlx is configured with
#    default-features = false and only the postgres driver is enabled.
#    sqlx-mysql is not compiled or linked.
# 4. No fixed rsa version is available upstream.
#
# Re-evaluate when a patched rsa release is published.
#
# RUSTSEC-2026-0097: rand 0.8.5 unsound with custom logger using rand::rng()
#
# Accepted because:
# 1. rand 0.8.5 is a transitive dependency pulled in by sqlx 0.8.6
#    (sqlx-postgres, sqlx-mysql) and openidconnect 4.0.1 — both at their
#    latest stable versions with no upgrade path available.
# 2. This project does not use a custom logger that calls rand::rng() in
#    its logging implementation, which is the trigger for the unsoundness.
# 3. The direct rand dependency (0.9.x) is not affected.
#
# Re-evaluate when sqlx/openidconnect release versions that depend on rand 0.9+.
ignore = ["RUSTSEC-2023-0071", "RUSTSEC-2026-0097"]
