name: Security audit
on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  security_audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            cargo:
              - '**/Cargo.toml'
              - '**/Cargo.lock'
      - uses: actions-rs/audit-check@v1
        if: steps.changes.outputs.cargo == 'true'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Skip (no dependency changes)
        if: steps.changes.outputs.cargo != 'true'
        run: echo "No Cargo.toml/Cargo.lock changes — skipping security audit"
