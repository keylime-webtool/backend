name: Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read
  statuses: write

jobs:
  coverage:
    name: Code coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            rust:
              - '**/*.rs'
              - '**/Cargo.toml'
              - '**/Cargo.lock'
      - name: Install cargo-tarpaulin
        if: steps.changes.outputs.rust == 'true'
        run: cargo install cargo-tarpaulin
      - name: Run coverage
        if: steps.changes.outputs.rust == 'true'
        run: cargo tarpaulin -o Json -o Xml --output-dir coverage/
      - name: Show coverage
        if: steps.changes.outputs.rust == 'true'
        run: |
          set -eu
          total=$(jq .coverage coverage/tarpaulin-report.json | grep -oE "[0-9]{1,3}\.[0-9]{0,2}")
          echo "COVERAGE: ${total}%"
      - name: Report coverage in PR status
        if: steps.changes.outputs.rust == 'true' && github.event_name == 'pull_request'
        run: |
          set -eu
          total=$(jq .coverage coverage/tarpaulin-report.json | grep -oE "[0-9]{1,3}\.[0-9]{0,2}")
          echo "Posting coverage status: ${total}%"
          curl -sf \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${COMMIT_SHA}" \
            -d "{\"state\": \"success\", \"target_url\": \"https://github.com/${{ github.repository }}/pull/${PULL_NUMBER}/checks?check_run_id=${RUN_ID}\", \"description\": \"${total}%\", \"context\": \"Measured coverage\"}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          RUN_ID: ${{ github.run_id }}
          PULL_NUMBER: ${{ github.event.pull_request.number }}
      - name: Upload coverage report
        if: steps.changes.outputs.rust == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/cobertura.xml
      - name: Skip (no Rust changes)
        if: steps.changes.outputs.rust != 'true'
        run: echo "No Rust source changes — skipping coverage"
