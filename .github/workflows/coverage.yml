name: Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  coverage:
    name: Code coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            rust:
              - '**/*.rs'
              - '**/Cargo.toml'
              - '**/Cargo.lock'
      - name: Install cargo-tarpaulin
        if: steps.changes.outputs.rust == 'true'
        run: cargo install cargo-tarpaulin
      - name: Run coverage
        if: steps.changes.outputs.rust == 'true'
        run: cargo tarpaulin -o Json -o Xml --output-dir coverage/
      - name: Report coverage
        if: steps.changes.outputs.rust == 'true'
        run: |
          set -eu
          total=$(jq .coverage coverage/tarpaulin-report.json | grep -oE "[0-9]{1,3}\.[0-9]{0,2}")
          echo "## Code Coverage" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Line coverage** | **${total}%** |" >> "$GITHUB_STEP_SUMMARY"
      - name: Upload coverage report
        if: steps.changes.outputs.rust == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/cobertura.xml
      - name: Skip (no Rust changes)
        if: steps.changes.outputs.rust != 'true'
        run: echo "No Rust source changes — skipping coverage"
