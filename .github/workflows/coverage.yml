name: Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read
  statuses: write

jobs:
  coverage:
    name: Code coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            rust:
              - '**/*.rs'
              - '**/Cargo.toml'
              - '**/Cargo.lock'
      - name: Install cargo-tarpaulin
        if: steps.changes.outputs.rust == 'true'
        run: cargo install cargo-tarpaulin
      - name: Run coverage
        if: steps.changes.outputs.rust == 'true'
        run: cargo tarpaulin -o Json -o Xml --output-dir coverage/
      - name: Show coverage
        if: steps.changes.outputs.rust == 'true'
        run: |
          set -eu
          total=$(jq .coverage coverage/tarpaulin-report.json | grep -oE "[0-9]{1,3}\.[0-9]{0,2}")
          echo "COVERAGE: ${total}%"
      - name: Report coverage in PR status
        if: steps.changes.outputs.rust == 'true' && github.event_name == 'pull_request'
        run: |
          set -eu
          total=$(jq .coverage coverage/tarpaulin-report.json | grep -oE "[0-9]{1,3}\.[0-9]{0,2}")
          echo "Posting coverage status: ${total}%"
          gh api \
            "repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }}" \
            -f state=success \
            -f "target_url=https://github.com/${{ github.repository }}/pull/${{ github.event.pull_request.number }}/checks?check_run_id=${{ github.run_id }}" \
            -f "description=${total}%" \
            -f "context=Measured coverage"
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Upload coverage report
        if: steps.changes.outputs.rust == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/cobertura.xml
      - name: Skip (no Rust changes)
        if: steps.changes.outputs.rust != 'true'
        run: echo "No Rust source changes — skipping coverage"
